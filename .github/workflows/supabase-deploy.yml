name: Deploy to Supabase

on:
  push:
    branches:
      - claude/build-professor-ai-app-sDbyz
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      # Always check out the feature branch so we get the new migrations + functions
      - uses: actions/checkout@v4
        with:
          ref: claude/build-professor-ai-app-sDbyz

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      # Mark old migrations as already applied so db push doesn't try to re-run them
      # (the tables exist in the DB but weren't tracked in migration history)
      - name: Repair migration history
        run: |
          supabase migration repair --status applied 20240001
          supabase migration repair --status applied 20240002
          supabase migration repair --status applied 20250002

      - name: Push new DB migrations
        run: supabase db push

      - name: Deploy edge functions
        run: |
          supabase functions deploy google-oauth
          supabase functions deploy google-calendar-sync
          supabase functions deploy google-calendar-write

      - name: Set Google OAuth secrets
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          if [ -n "$GOOGLE_CLIENT_ID" ]; then
            supabase secrets set GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET"
            echo "Google OAuth secrets set."
          else
            echo "GOOGLE_CLIENT_ID not provided — skipping."
          fi
