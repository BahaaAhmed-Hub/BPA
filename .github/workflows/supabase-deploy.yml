name: Deploy to Supabase

on:
  push:
    branches:
      - claude/build-professor-ai-app-sDbyz
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/build-professor-ai-app-sDbyz

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Apply only our new migrations directly via the Management API.
      # This bypasses `supabase db push` and its migration-history conflicts.
      - name: Apply new DB migrations via API
        run: |
          for file in \
            supabase/migrations/20250010_google_accounts_secure.sql \
            supabase/migrations/20250011_google_calendar_settings.sql \
            supabase/migrations/20250012_google_event_metadata.sql; do
            echo "Applying $file ..."
            SQL=$(cat "$file")
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": $(echo "$SQL" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            echo "  → HTTP $HTTP_CODE: $BODY"
            if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
              echo "ERROR applying $file" && exit 1
            fi
          done
          echo "All migrations applied."

      - name: Link project (for functions deploy)
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy edge functions
        run: |
          supabase functions deploy google-oauth
          supabase functions deploy google-calendar-sync
          supabase functions deploy google-calendar-write

      - name: Set Google OAuth secrets
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          if [ -n "$GOOGLE_CLIENT_ID" ]; then
            supabase secrets set GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET"
            echo "Google OAuth secrets set."
          else
            echo "GOOGLE_CLIENT_ID not provided — skipping."
          fi

